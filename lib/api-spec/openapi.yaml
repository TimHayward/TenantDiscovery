openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: m365
    description: Microsoft 365 health data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /healthz/with-metadata:
    get:
      operationId: healthCheckWithMetadata
      tags: [health]
      summary: Health check with field metadata
      responses:
        "200":
          description: Healthy with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatusWithMetadata"

  /m365/overview:
    get:
      operationId: getM365Overview
      tags: [m365]
      summary: M365 tenant overview KPIs
      responses:
        "200":
          description: Overview KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365Overview"

  /m365/overview/with-metadata:
    get:
      operationId: getM365OverviewWithMetadata
      tags: [m365]
      summary: M365 tenant overview KPIs with field metadata
      responses:
        "200":
          description: Overview KPIs with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365OverviewWithMetadata"

  /m365/users:
    get:
      operationId: getM365Users
      tags: [m365]
      summary: User accounts summary and list
      responses:
        "200":
          description: User data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365UsersData"

  /m365/users/with-metadata:
    get:
      operationId: getM365UsersWithMetadata
      tags: [m365]
      summary: User accounts summary and list with field metadata
      responses:
        "200":
          description: User data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365UsersDataWithMetadata"

  /m365/users/admin-exposure:
    get:
      operationId: getM365AdminExposure
      tags: [m365]
      summary: Administrator role exposure and PIM eligibility
      responses:
        "200":
          description: Administrator exposure data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365AdminExposureData"

  /m365/licenses:
    get:
      operationId: getM365Licenses
      tags: [m365]
      summary: License allocation and usage
      responses:
        "200":
          description: License data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365LicensesData"

  /m365/licenses/with-metadata:
    get:
      operationId: getM365LicensesWithMetadata
      tags: [m365]
      summary: License allocation and usage with field metadata
      responses:
        "200":
          description: License data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365LicensesDataWithMetadata"

  /m365/security:
    get:
      operationId: getM365Security
      tags: [m365]
      summary: Security scores and MFA status
      responses:
        "200":
          description: Security data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365SecurityData"

  /m365/security/with-metadata:
    get:
      operationId: getM365SecurityWithMetadata
      tags: [m365]
      summary: Security scores and MFA status with field metadata
      responses:
        "200":
          description: Security data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365SecurityDataWithMetadata"

  /m365/security/estate:
    get:
      operationId: getM365SecurityEstate
      tags: [m365]
      summary: Discovered devices, SaaS apps, and OAuth apps in the estate
      responses:
        "200":
          description: Security estate data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityEstateData"

  /m365/security/estate/with-metadata:
    get:
      operationId: getM365SecurityEstateWithMetadata
      tags: [m365]
      summary: Discovered devices, SaaS apps, and OAuth apps in the estate with field metadata
      responses:
        "200":
          description: Security estate data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityEstateDataWithMetadata"

  /m365/exchange:
    get:
      operationId: getM365Exchange
      tags: [m365]
      summary: Exchange Online mailbox and mail flow stats
      responses:
        "200":
          description: Exchange data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365ExchangeData"

  /m365/exchange/with-metadata:
    get:
      operationId: getM365ExchangeWithMetadata
      tags: [m365]
      summary: Exchange Online mailbox and mail flow stats with field metadata
      responses:
        "200":
          description: Exchange data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365ExchangeDataWithMetadata"

  /m365/teams:
    get:
      operationId: getM365Teams
      tags: [m365]
      summary: Microsoft Teams usage and activity
      responses:
        "200":
          description: Teams data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365TeamsData"

  /m365/teams/with-metadata:
    get:
      operationId: getM365TeamsWithMetadata
      tags: [m365]
      summary: Microsoft Teams usage and activity with field metadata
      responses:
        "200":
          description: Teams data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365TeamsDataWithMetadata"

  /m365/sharepoint:
    get:
      operationId: getM365SharePoint
      tags: [m365]
      summary: SharePoint sites and storage
      responses:
        "200":
          description: SharePoint data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365SharePointData"

  /m365/sharepoint/with-metadata:
    get:
      operationId: getM365SharePointWithMetadata
      tags: [m365]
      summary: SharePoint sites and storage with field metadata
      responses:
        "200":
          description: SharePoint data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365SharePointDataWithMetadata"

  /m365/compliance:
    get:
      operationId: getM365Compliance
      tags: [m365]
      summary: Compliance and policy status
      responses:
        "200":
          description: Compliance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365ComplianceData"

  /m365/compliance/with-metadata:
    get:
      operationId: getM365ComplianceWithMetadata
      tags: [m365]
      summary: Compliance and policy status with field metadata
      responses:
        "200":
          description: Compliance data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365ComplianceDataWithMetadata"

  /m365/service-health:
    get:
      operationId: getM365ServiceHealth
      tags: [m365]
      summary: Microsoft 365 service health status
      responses:
        "200":
          description: Service health data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365ServiceHealthData"

  /m365/service-health/with-metadata:
    get:
      operationId: getM365ServiceHealthWithMetadata
      tags: [m365]
      summary: Microsoft 365 service health status with field metadata
      responses:
        "200":
          description: Service health data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365ServiceHealthDataWithMetadata"

  /m365/intune:
    get:
      operationId: getM365Intune
      tags: [m365]
      summary: Intune device management and compliance
      responses:
        "200":
          description: Intune data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365IntuneData"

  /m365/intune/with-metadata:
    get:
      operationId: getM365IntuneWithMetadata
      tags: [m365]
      summary: Intune device management and compliance with field metadata
      responses:
        "200":
          description: Intune data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365IntuneDataWithMetadata"

  /m365/intune/device/{deviceId}/compliance:
    get:
      operationId: getM365IntuneDeviceCompliance
      tags: [m365]
      summary: Per-device compliance drill-down — which specific policy rules are failing
      parameters:
        - in: path
          name: deviceId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device compliance detail with failing rules per policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceComplianceDetail"

  /m365/apps:
    get:
      operationId: getM365Apps
      tags: [m365]
      summary: Enterprise application registrations with security assessment
      responses:
        "200":
          description: App registrations and security posture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365AppsData"

  /m365/apps/with-metadata:
    get:
      operationId: getM365AppsWithMetadata
      tags: [m365]
      summary: Enterprise application registrations with security assessment and field metadata
      responses:
        "200":
          description: App registrations and security posture with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365AppsDataWithMetadata"

  /m365/service-principals:
    get:
      operationId: getM365ServicePrincipals
      tags: [m365]
      summary: Service principals (enterprise apps) with consent grants and sign-in activity
      responses:
        "200":
          description: Service principals data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365ServicePrincipalsData"

  /m365/service-principals/with-metadata:
    get:
      operationId: getM365ServicePrincipalsWithMetadata
      tags: [m365]
      summary: Service principals (enterprise apps) with consent grants and sign-in activity with field metadata
      responses:
        "200":
          description: Service principals data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365ServicePrincipalsDataWithMetadata"

  /m365/intune/apps:
    get:
      operationId: getM365IntuneApps
      tags: [m365]
      summary: Intune app installation health and discovered app estate
      responses:
        "200":
          description: App installation success/failure and managed vs unmanaged discovered apps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365IntuneAppsData"

  /m365/groups:
    get:
      operationId: getM365Groups
      tags: [m365]
      summary: Entra ID groups list
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Groups response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365GroupsData"

  /m365/groups/with-metadata:
    get:
      operationId: getM365GroupsWithMetadata
      tags: [m365]
      summary: Entra ID groups list with field metadata
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Groups response with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365GroupsDataWithMetadata"

  /m365/permissions/manifest:
    get:
      operationId: getM365PermissionsManifest
      tags: [m365]
      summary: Permissions manifest
      responses:
        "200":
          description: Permissions manifest response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365PermissionsManifestData"

  /m365/permissions/manifest/with-metadata:
    get:
      operationId: getM365PermissionsManifestWithMetadata
      tags: [m365]
      summary: Permissions manifest with field metadata
      responses:
        "200":
          description: Permissions manifest with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365PermissionsManifestDataWithMetadata"

  /m365/permissions/feature/{featureId}:
    get:
      operationId: getM365PermissionsFeature
      tags: [m365]
      summary: Permission details for one feature
      parameters:
        - in: path
          name: featureId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Permission details for a feature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365PermissionsFeatureData"

  /m365/permissions/feature/{featureId}/with-metadata:
    get:
      operationId: getM365PermissionsFeatureWithMetadata
      tags: [m365]
      summary: Permission details for one feature with field metadata
      parameters:
        - in: path
          name: featureId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Permission details for a feature with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365PermissionsFeatureDataWithMetadata"

  /onboarding/setup:
    get:
      operationId: getOnboardingSetup
      tags: [m365]
      summary: Get stored onboarding setup details with secrets redacted
      responses:
        "200":
          description: Redacted onboarding setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSetup"
    patch:
      operationId: patchOnboardingSetup
      tags: [m365]
      summary: Save onboarding setup details securely
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingSetupPatch"
      responses:
        "200":
          description: Updated redacted onboarding setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSetup"

  /onboarding/status:
    get:
      operationId: getOnboardingStatus
      tags: [m365]
      summary: Onboarding status and required permission gaps
      responses:
        "200":
          description: Onboarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStatus"

  /m365/data-sources:
    get:
      operationId: getM365DataSources
      tags: [m365]
      summary: Data source registry for dashboard metrics
      parameters:
        - in: query
          name: tab
          required: false
          schema:
            type: string
        - in: query
          name: metricId
          required: false
          schema:
            type: string
        - in: query
          name: evidenceStatus
          required: false
          schema:
            $ref: "#/components/schemas/EvidenceStatus"
      responses:
        "200":
          description: Registry entries and summary counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365DataSourcesResponse"

  /m365/adoption:
    get:
      operationId: getM365Adoption
      tags: [m365]
      summary: Workload adoption and value realisation scoring across M365 services
      responses:
        "200":
          description: Adoption data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365AdoptionData"

  /m365/adoption/with-metadata:
    get:
      operationId: getM365AdoptionWithMetadata
      tags: [m365]
      summary: Workload adoption and value realisation scoring with field metadata
      responses:
        "200":
          description: Adoption data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M365AdoptionDataWithMetadata"

  /m365/powerbi:
    get:
      operationId: getM365PowerBI
      tags: [m365]
      summary: Power BI tenant governance metrics
      responses:
        "200":
          description: Power BI governance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PowerBIData"

  /m365/powerbi/with-metadata:
    get:
      operationId: getM365PowerBIWithMetadata
      tags: [m365]
      summary: Power BI tenant governance metrics with field metadata
      responses:
        "200":
          description: Power BI governance data with field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PowerBIDataWithMetadata"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    OnboardingSetup:
      type: object
      properties:
        tenantId:
          type: string
          nullable: true
        clientId:
          type: string
          nullable: true
        clientSecret:
          type: string
          nullable: true
        hasClientSecret:
          type: boolean
        setupComplete:
          type: boolean
        setupCompletedAt:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - tenantId
        - clientId
        - clientSecret
        - hasClientSecret
        - setupComplete
        - setupCompletedAt
        - createdAt
        - updatedAt

    OnboardingSetupPatch:
      type: object
      properties:
        tenantId:
          type: string
          nullable: true
        clientId:
          type: string
          nullable: true
        clientSecret:
          type: string
          nullable: true
        setupComplete:
          type: boolean

    OnboardingStatus:
      type: object
      properties:
        targetClientId:
          type: string
          nullable: true
        targetTenantId:
          type: string
          nullable: true
        targetAppDisplayName:
          type: string
          nullable: true
        requiredApplicationPermissions:
          type: array
          items:
            type: string
        configuredApplicationPermissions:
          type: array
          items:
            type: string
        missingRequiredPermissions:
          type: array
          items:
            type: string
        hasMissingRequiredPermissions:
          type: boolean
        permissionCheckError:
          type: string
          nullable: true
        needsOnboarding:
          type: boolean
        setup:
          $ref: "#/components/schemas/OnboardingSetup"
      required:
        - targetClientId
        - targetTenantId
        - targetAppDisplayName
        - requiredApplicationPermissions
        - configuredApplicationPermissions
        - missingRequiredPermissions
        - hasMissingRequiredPermissions
        - permissionCheckError
        - needsOnboarding
        - setup

    EvidenceStatus:
      type: string
      enum: [apiBacked, partial, manual, automationCandidate, notAssessed]

    ConfidenceLabel:
      type: string
      enum: [high, medium, low, unknown]

    FieldEvidenceMetadata:
      type: object
      properties:
        evidenceStatus:
          $ref: "#/components/schemas/EvidenceStatus"
        confidenceLabel:
          $ref: "#/components/schemas/ConfidenceLabel"
        sourceLabel:
          type: string
        notes:
          type: array
          items:
            type: string
      required: [evidenceStatus, confidenceLabel]

    FieldMetadataMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/FieldEvidenceMetadata"

    HealthStatusWithMetadata:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/HealthStatus"
        fieldMetadata:
          $ref: "#/components/schemas/FieldMetadataMap"
        metadataVersion:
          type: string
      required: [data, fieldMetadata, metadataVersion]

    LicenseDependency:
      type: string
      enum:
        - none
        - m365-license-required
        - intune-license-required
        - entra-id-p2-recommended
        - defender-xdr-license-recommended

    DataSourceEndpoint:
      type: object
      properties:
        provider:
          type: string
        label:
          type: string
        endpoint:
          type: string
        notes:
          type: array
          items:
            type: string
      required: [provider, label, endpoint, notes]

    MetricDataSourceEntry:
      type: object
      properties:
        metricId:
          type: string
        metricName:
          type: string
        tab:
          type: string
        dataSources:
          type: array
          items:
            $ref: "#/components/schemas/DataSourceEndpoint"
        permissionDependencies:
          type: array
          items:
            type: string
        licenseDependencies:
          type: array
          items:
            $ref: "#/components/schemas/LicenseDependency"
        confidenceLabel:
          $ref: "#/components/schemas/ConfidenceLabel"
        evidenceStatus:
          $ref: "#/components/schemas/EvidenceStatus"
        notes:
          type: array
          items:
            type: string
      required:
        - metricId
        - metricName
        - tab
        - dataSources
        - permissionDependencies
        - licenseDependencies
        - confidenceLabel
        - evidenceStatus
        - notes

    M365DataSourcesSummary:
      type: object
      properties:
        total:
          type: integer
        byConfidence:
          type: object
          properties:
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
            unknown:
              type: integer
          required: [high, medium, low, unknown]
        byEvidenceStatus:
          type: object
          properties:
            apiBacked:
              type: integer
            partial:
              type: integer
            manual:
              type: integer
            automationCandidate:
              type: integer
            notAssessed:
              type: integer
          required: [apiBacked, partial, manual, automationCandidate, notAssessed]
      required: [total, byConfidence, byEvidenceStatus]

    M365DataSourcesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MetricDataSourceEntry"
        summary:
          $ref: "#/components/schemas/M365DataSourcesSummary"
      required: [items, summary]

    M365Overview:
      type: object
      properties:
        tenantName:
          type: string
        tenantId:
          type: string
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalLicenses:
          type: integer
        assignedLicenses:
          type: integer
        mfaEnabledPercent:
          type: number
        secureScore:
          type: number
        secureScoreMax:
          type: number
        guestUsers:
          type: integer
        disabledUsers:
          type: integer
        activeServices:
          type: integer
        totalServices:
          type: integer
      required:
        - tenantName
        - tenantId
        - totalUsers
        - activeUsers
        - totalLicenses
        - assignedLicenses
        - mfaEnabledPercent
        - secureScore
        - secureScoreMax
        - guestUsers
        - disabledUsers
        - activeServices
        - totalServices

    M365OverviewWithMetadata:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/M365Overview"
        fieldMetadata:
          $ref: "#/components/schemas/FieldMetadataMap"
        metadataVersion:
          type: string
      required: [data, fieldMetadata, metadataVersion]

    GhostUserItem:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        userPrincipalName:
          type: string
        lastSignIn:
          type: string
          nullable: true
        daysInactive:
          type: integer
          nullable: true
        assignedLicenseCount:
          type: integer
        estimatedMonthlyCost:
          type: number
      required:
        - id
        - displayName
        - userPrincipalName
        - lastSignIn
        - daysInactive
        - assignedLicenseCount
        - estimatedMonthlyCost

    UserItem:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        userPrincipalName:
          type: string
        accountEnabled:
          type: boolean
        userType:
          type: string
        mfaEnabled:
          type: boolean
        lastSignIn:
          type: string
          nullable: true
        assignedLicenses:
          type: integer
        department:
          type: string
          nullable: true
        jobTitle:
          type: string
          nullable: true
      required:
        - id
        - displayName
        - userPrincipalName
        - accountEnabled
        - userType
        - mfaEnabled
        - lastSignIn
        - assignedLicenses
        - department
        - jobTitle

    M365UsersData:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        disabledUsers:
          type: integer
        guestUsers:
          type: integer
        memberUsers:
          type: integer
        mfaEnabled:
          type: integer
        mfaDisabled:
          type: integer
        neverSignedIn:
          type: integer
        usersByDepartment:
          type: array
          items:
            type: object
            properties:
              department:
                type: string
              count:
                type: integer
            required: [department, count]
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserItem"
        ghostUsers:
          type: array
          items:
            $ref: "#/components/schemas/GhostUserItem"
        ghostLicensedCount:
          type: integer
        estimatedMonthlyWaste:
          type: number
      required:
        - totalUsers
        - activeUsers
        - disabledUsers
        - guestUsers
        - memberUsers
        - mfaEnabled
        - mfaDisabled
        - neverSignedIn
        - usersByDepartment
        - users
        - ghostUsers
        - ghostLicensedCount
        - estimatedMonthlyWaste

    M365UsersDataWithMetadata:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/M365UsersData"
        fieldMetadata:
          $ref: "#/components/schemas/FieldMetadataMap"
        metadataVersion:
